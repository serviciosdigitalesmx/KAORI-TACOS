<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tacos Kas Ri</title>
  <style>
    :root{
      --bg:#0c0a09;
      --panel:#171312;
      --accent:#ea580c;
      --accent2:#f59e0b;
      --lime:#84cc16;
      --text:#fafaf9;
      --muted:#a8a29e;
    }
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family:Inter,system-ui,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 10% 10%, rgba(234,88,12,.3), transparent 25%),
        radial-gradient(circle at 90% 0%, rgba(132,204,22,.18), transparent 20%),
        linear-gradient(180deg, #18110f 0%, var(--bg) 45%, #0a0908 100%);
    }
    body:before{
      content:'';
      position:fixed;
      inset:0;
      pointer-events:none;
      background:
        linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px),
        linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px);
      background-size: 64px 64px;
      mask-image: radial-gradient(circle at center, black 50%, transparent 100%);
      opacity:.35;
    }
    .wrap{max-width:1200px;margin:0 auto;padding:22px 18px 130px;position:relative;z-index:1}
    .hero{
      padding:28px 0 18px;
      display:grid;
      gap:12px;
      position:relative;
    }
    .hero:after{
      content:'';
      position:absolute;
      right:0; top:0;
      width:180px; height:180px;
      background: radial-gradient(circle, rgba(234,88,12,.25), transparent 70%);
      filter: blur(12px);
      pointer-events:none;
    }
    .eyebrow{
      align-self:start;
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:8px 12px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
      text-transform:uppercase;
      letter-spacing:.28em;
      font-size:10px;
      font-weight:900;
      color:#fdba74;
      width:max-content;
    }
    .title{
      font-size:clamp(2.3rem,6vw,5.4rem);
      margin:0;
      font-weight:900;
      letter-spacing:-.06em;
      line-height:.92;
      text-transform:uppercase;
    }
    .title span{color:#ef4444}
    .sub{color:var(--muted);margin:0;font-size:1rem;max-width:760px}
    .contactbar{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-top:8px;
    }
    .contact{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:10px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.05);
      border:1px solid rgba(255,255,255,.08);
      color:#fff;
      font-size:12px;
      font-weight:800;
    }
    .contact.whatsapp{border-color:rgba(34,197,94,.35);background:rgba(34,197,94,.12)}
    .contact.phone{border-color:rgba(234,88,12,.35);background:rgba(234,88,12,.12)}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin:14px 0 10px}
    .chip{
      border:1px solid rgba(255,255,255,.1);
      padding:11px 14px;
      border-radius:999px;
      background:rgba(255,255,255,.04);
      color:#fff;
      cursor:pointer;
      font-weight:800;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-size:11px;
    }
    .chip.active{
      background:linear-gradient(135deg,var(--accent),#b91c1c);
      border-color:transparent;
      box-shadow:0 12px 30px rgba(234,88,12,.2);
    }
    .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:16px;margin-top:16px}
    .card{
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.09);
      border-radius:24px;
      overflow:hidden;
      cursor:pointer;
      transition:transform .2s ease,border-color .2s ease,box-shadow .2s ease;
      box-shadow:0 16px 40px rgba(0,0,0,.18);
    }
    .card:hover{transform:translateY(-3px);border-color:rgba(234,88,12,.5);box-shadow:0 24px 52px rgba(0,0,0,.28)}
    .img{width:100%;height:184px;object-fit:cover;display:block}
    .body{padding:15px}
    .row{display:flex;justify-content:space-between;gap:12px;align-items:flex-start}
    .name{margin:0 0 6px;font-size:1.05rem;font-weight:900;line-height:1.05}
    .desc{margin:0;color:var(--muted);font-size:.9rem}
    .price{
      font-weight:900;
      color:#fde68a;
      white-space:nowrap;
      padding:8px 10px;
      border-radius:14px;
      background:rgba(0,0,0,.18);
      border:1px solid rgba(255,255,255,.08);
    }
    .cartbar{
      position:fixed;
      left:0;right:0;bottom:0;
      background:rgba(15,12,11,.94);
      border-top:1px solid rgba(255,255,255,.08);
      backdrop-filter:blur(18px);
      padding:12px 16px;
      z-index:20;
    }
    .cartinner{max-width:1200px;margin:0 auto;display:flex;justify-content:space-between;gap:12px;align-items:center}
    .btn{
      border:0;
      border-radius:16px;
      padding:14px 16px;
      color:white;
      font-weight:900;
      cursor:pointer;
      letter-spacing:.02em;
      background:linear-gradient(135deg,var(--accent),#c2410c);
    }
    .btn.secondary{background:rgba(255,255,255,.08)}
    .modal{position:fixed;inset:0;background:rgba(0,0,0,.76);display:none;align-items:center;justify-content:center;padding:20px;z-index:30}
    .modal.active{display:flex}
    .sheet{width:min(560px,100%);background:#fff;color:#111;border-radius:28px;overflow:hidden;box-shadow:0 28px 80px rgba(0,0,0,.5)}
    .sheetimg{width:100%;height:240px;object-fit:cover;display:block}
    .sheetbody{padding:20px}
    .qty{display:flex;align-items:center;gap:12px}
    .qty button{width:42px;height:42px;border-radius:12px;border:0;font-size:18px;background:#f5f5f5}
    .line{display:flex;justify-content:space-between;align-items:center;gap:12px;margin-top:16px}
    .small{color:#6b7280;font-size:.9rem}
    .status{
      display:none;
      margin-top:12px;
      padding:12px 14px;
      border-radius:14px;
      background:rgba(234,88,12,.14);
      border:1px solid rgba(234,88,12,.3);
      color:#fed7aa;
      font-size:.92rem;
      font-weight:700;
    }
    @media (max-width:640px){
      .cartinner{flex-direction:column;align-items:stretch}
      .contactbar{gap:8px}
      .contact{width:100%;justify-content:center}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <div class="eyebrow">Servicio a domicilio</div>
      <div class="small" id="subtitle"></div>
      <h1 class="title" id="businessName">Tacos <span>Kas Ri</span></h1>
      <p class="sub" id="hours"></p>
      <p class="sub">Selecciona productos, ajusta cantidades y envía el pedido por WhatsApp.</p>
      <div class="contactbar">
        <div class="contact whatsapp">WhatsApp 811-508-4869</div>
        <div class="contact phone">Tel 554-854-9106</div>
      </div>
      <div id="status" class="status"></div>
      <div class="chips" id="chips"></div>
    </section>
    <section class="grid" id="grid"></section>
  </div>
  <div class="cartbar">
    <div class="cartinner">
      <div><div style="font-weight:800" id="cartSummary">0 productos</div><div class="small" id="cartTotal">$0</div></div>
      <div style="display:flex;gap:10px"><button class="btn secondary" onclick="openSummary()">Ver pedido</button><button class="btn" onclick="sendWhatsApp()">Enviar por WhatsApp</button></div>
    </div>
  </div>
  <div class="modal" id="modal" onclick="closeModal(event)">
    <div class="sheet" onclick="event.stopPropagation()">
      <img id="mimg" class="sheetimg" alt="">
      <div class="sheetbody">
        <h2 id="mname" style="margin:0 0 6px;font-size:1.7rem"></h2>
        <div id="mprice" style="font-weight:900;color:#ea580c;margin-bottom:10px;font-size:1.1rem"></div>
        <div class="small" id="mdesc"></div>
        <input id="mnotes" placeholder="Indicaciones especiales" style="width:100%;margin-top:12px;padding:12px 14px;border:1px solid #e5e7eb;border-radius:14px">
        <div class="line">
          <div class="qty"><button onclick="changeQty(-1)">-</button><strong id="qty">1</strong><button onclick="changeQty(1)">+</button></div>
          <button class="btn" onclick="addCurrent()">Agregar</button>
        </div>
      </div>
    </div>
  </div>
  <script>
    const BACKEND_URL = 'https://script.google.com/macros/s/AKfycbzBzGEVJfpNOE__Ep0fyGec80fm_UbA3HcwfeFFdbkjw1S7cK_4OCYcBIQKvlrWvpMUKQ/exec?format=json';
    let state={categories:[],items:[],config:null,active:'all',cart:[],current:null,qty:1};
    const money=new Intl.NumberFormat('es-MX',{style:'currency',currency:'MXN',minimumFractionDigits:0});
    function showStatus(message){ const el=document.getElementById('status'); el.textContent=message; el.style.display='block'; }
    async function load(){
      try{
        const res=await fetch(BACKEND_URL,{cache:'no-store'});
        if(!res.ok) throw new Error('Backend no disponible');
        const data=await res.json();
        if(!data || !Array.isArray(data.menu) || !data.config) throw new Error('Respuesta inválida del backend');
        state.config=data.config;
        state.items=data.menu.filter(i=>i.available!==false);
        state.categories=[...new Map(state.items.map(i=>[i.sec,{id:i.sec,name:pretty(i.sec)}]))].map(([,v])=>v);
        document.getElementById('businessName').textContent=state.config.businessName;
        document.getElementById('subtitle').textContent=state.config.heroSubtitle;
        document.getElementById('hours').textContent=`Horario: ${state.config.openHour}:00 a ${state.config.closeHour===24?'12:00':state.config.closeHour+':00'} | Cerrado los ${state.config.closedDay}s`;
        renderChips();
        renderGrid();
        refreshCart();
      }catch(err){
        showStatus('No se pudo cargar el menú desde Apps Script. Revisa el despliegue y vuelve a intentar.');
        console.error(err);
      }
    }
    function pretty(id){ return ({tacos:'Tacos',hamburguesas:'Hamburguesas',papas:'Papas',tortas:'Tortas',frijoles:'Frijoles'})[id] || id; }
    function renderChips(){ const c=document.getElementById('chips'); c.innerHTML=['all',...state.categories.map(x=>x.id)].map(id=>{ const label=id==='all'?'Todo':pretty(id); return `<button class="chip ${state.active===id?'active':''}" onclick="setCategory('${id}')">${label}</button>`; }).join(''); }
    function setCategory(id){ state.active=id; renderChips(); renderGrid(); }
    function renderGrid(){ const grid=document.getElementById('grid'); const items=state.active==='all'?state.items:state.items.filter(i=>i.sec===state.active); grid.innerHTML=items.map(item=>`<article class="card" onclick="openItem(${item.id})"><img class="img" src="${item.image || 'https://images.unsplash.com/photo-1547592180-85f173990554?auto=format&fit=crop&w=900&q=80'}" alt="${item.name}"><div class="body"><div class="row"><div><h3 class="name">${item.name}</h3><p class="desc">${item.desc || ''}</p></div><div class="price">${money.format(item.price)}</div></div></div></article>`).join(''); }
    function openItem(id){ const item=state.items.find(x=>x.id===id); state.current=item; state.qty=1; document.getElementById('mimg').src=item.image || 'https://images.unsplash.com/photo-1547592180-85f173990554?auto=format&fit=crop&w=900&q=80'; document.getElementById('mname').textContent=item.name; document.getElementById('mprice').textContent=money.format(item.price); document.getElementById('mdesc').textContent=item.desc || ''; document.getElementById('mnotes').value=''; document.getElementById('qty').textContent='1'; document.getElementById('modal').classList.add('active'); }
    function changeQty(delta){ state.qty=Math.max(1,state.qty+delta); document.getElementById('qty').textContent=state.qty; }
    function addCurrent(){ const notes=document.getElementById('mnotes').value.trim(); const existing=state.cart.find(x=>x.id===state.current.id && x.notes===notes); if(existing) existing.qty+=state.qty; else state.cart.push({id:state.current.id,qty:state.qty,notes}); refreshCart(); document.getElementById('modal').classList.remove('active'); }
    function refreshCart(){ const count=state.cart.reduce((a,b)=>a+b.qty,0); const total=state.cart.reduce((sum,row)=>{ const item=state.items.find(x=>x.id===row.id); return sum + item.price*row.qty; },0); document.getElementById('cartSummary').textContent=`${count} productos`; document.getElementById('cartTotal').textContent=money.format(total); }
    function buildMessage(){ let msg=`*${state.config.businessName.toUpperCase()}*%0A*Servicio a domicilio*%0A%0A`; state.cart.forEach(row=>{ const item=state.items.find(x=>x.id===row.id); msg+=`▫️ ${row.qty} x ${item.name}`; if(row.notes) msg+=` (%20${row.notes}%20)`; msg+=` - *${money.format(item.price*row.qty)}*%0A`; }); msg+=`%0A*TOTAL: ${document.getElementById('cartTotal').textContent}*`; return msg; }
    function sendWhatsApp(){ if(!state.cart.length) return alert('Agrega productos primero'); const msg=buildMessage().replaceAll('%20',' '); window.open(`https://wa.me/${state.config.whatsapp}?text=${encodeURIComponent(decodeURIComponent(msg))}`,'_blank'); }
    function openSummary(){ if(!state.cart.length) return alert('Tu pedido está vacío'); alert(buildMessage().replaceAll('%20',' ')); }
    function closeModal(e){ if(e.target.id==='modal') document.getElementById('modal').classList.remove('active'); }
    load();
  </script>
</body>
</html>
